<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>研修進捗管理画面</title>

<style>
body{
  font-family:sans-serif;
  max-width:900px;
  margin:20px auto;
  padding:20px;
  background:#f5f5f3;
}

h1{
  margin-bottom:20px;
}

.user{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #ddd;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.bar{
  height:20px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin-top:8px;
}

.fill{
  height:100%;
  background:#1D9E75;
}

.info{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}
</style>
</head>

<body>

<h1>📊 研修進捗ランキング</h1>
<div id="summary" style="
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
"></div>

<div id="list">読込中...</div>
<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbzW6qSWlPgFish_sdpbi0pDod-nUmBWwR90yvRi8dZMKSMdVFX24ewEtpzgwyzlGCxx/exec';

function loadSummary(){

  window.summaryCallback = function(res){

    const list =
      document.getElementById('list');
const total = res.data.length;

const main = res.data.filter(
  u => u.percent >= 100
).length;

const sub = res.data.filter(
  u => u.completed >= 5 && u.percent < 100
).length;

const training =
  total - main - sub;

document.getElementById('summary').innerHTML = `
<div style="background:white;padding:15px;border-radius:10px;border:1px solid #ddd;min-width:140px">
  <div style="font-size:12px;color:#666">登録人数</div>
  <div style="font-size:28px;font-weight:bold">${total}</div>
</div>

<div style="background:#E1F5EE;padding:15px;border-radius:10px;border:1px solid #9FE1CB;min-width:140px">
  <div style="font-size:12px;color:#0F6E56">メイン達成</div>
  <div style="font-size:28px;font-weight:bold">${main}</div>
</div>

<div style="background:#FFF8D6;padding:15px;border-radius:10px;border:1px solid #F5C400;min-width:140px">
  <div style="font-size:12px;color:#856404">研修中盤</div>
  <div style="font-size:28px;font-weight:bold">${sub}</div>
</div>

<div style="background:#F5F5F5;padding:15px;border-radius:10px;border:1px solid #ddd;min-width:140px">
  <div style="font-size:12px;color:#666">研修中</div>
  <div style="font-size:28px;font-weight:bold">${training}</div>
</div>
`;
    list.innerHTML='';
res.data.sort(
 (a,b)=>b.percent-a.percent
);
let rank = 1;

res.data.forEach((user,index)=>{

  if(index > 0 &&
     user.percent < res.data[index-1].percent){
    rank = index + 1;
  }

  let rankLabel =
    rank === 1 ? '🥇 1位 ' :
    rank === 2 ? '🥈 2位 ' :
    rank === 3 ? '🥉 3位 ' :
    rank + '位 ';
      list.innerHTML += `
        <div class="user">

       <div style="
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-weight:bold;
">

<span>
${rankLabel}${user.name}
</span>

<span>
${user.completed}/${user.total}
${user.percent >= 100
 ? '🏆達成'
 : user.percent >= 50
 ? '🟡進行中'
 : '🔴フォロー必要'}
</span>

</div>

          <div class="bar">
            <div class="fill"
              style="width:${user.percent}%">
            </div>
          </div>

        </div>
      `;
    });
  };

  const script =
    document.createElement('script');

  script.src =
    GAS_URL +
    '?action=summary' +
    '&callback=summaryCallback' +
    '&t=' + Date.now();

  document.body.appendChild(script);
}

loadSummary();
setInterval(loadSummary, 3000);
</script>

</body>
</html>
